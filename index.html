<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeTube - Свободное видео</title>
    <!-- Используем относительные пути -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Конфигурация Supabase -->
    <script>
        const SUPABASE_CONFIG = {
            url: 'https://zsjxcrjopoxoaavmnoef.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzanhjcmpvcG94b2Fhdm1ub2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTcyMTMsImV4cCI6MjA4Nzg3MzIxM30.MV8W9SAO3lvjLoqlQOLuGjIf3Ipa-OTJDNYVzs9Rfkc'
        };

        if (typeof supabase === 'undefined') {
            console.error('❌ Supabase SDK не загружен!');
            throw new Error('Supabase SDK не загружен');
        }

        const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        const supabaseHelpers = {
            async getVideos(filter = 'all', limit = 50) {
                try {
                    let query = supabaseClient
                        .from('videos')
                        .select('*')
                        .eq('status', 'completed');
                    
                    switch(filter) {
                        case 'latest':
                            query = query.order('created_at', { ascending: false });
                            break;
                        case 'popular':
                            query = query.order('views', { ascending: false });
                            break;
                        default:
                            query = query.order('created_at', { ascending: false });
                    }
                    
                    const { data, error } = await query.limit(limit);
                    if (error) throw error;
                    
                    // Добавляем заглушки для теста, если нет видео
                    if (!data || data.length === 0) {
                        return { data: getMockVideos(), error: null };
                    }
                    
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка получения видео:', error);
                    // Возвращаем тестовые видео при ошибке
                    return { data: getMockVideos(), error: null };
                }
            },

            async searchVideos(searchTerm) {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('*')
                        .eq('status', 'completed')
                        .ilike('title', `%${searchTerm}%`)
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    
                    if (!data || data.length === 0) {
                        // Фильтруем мок-данные по поиску
                        const mockVideos = getMockVideos().filter(v => 
                            v.title.toLowerCase().includes(searchTerm.toLowerCase())
                        );
                        return { data: mockVideos, error: null };
                    }
                    
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка поиска:', error);
                    return { data: getMockVideos(), error: null };
                }
            },

            getCurrentUser() {
                return supabaseClient.auth.getUser();
            },

            async signOut() {
                try {
                    const { error } = await supabaseClient.auth.signOut();
                    if (error) throw error;
                    localStorage.removeItem('user');
                    return { success: true, error: null };
                } catch (error) {
                    return { success: false, error };
                }
            },

            async testConnection() {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('count', { count: 'exact', head: true });
                    
                    if (error) throw error;
                    console.log('✅ Соединение с Supabase установлено');
                    return true;
                } catch (error) {
                    console.error('❌ Ошибка соединения с Supabase:', error.message);
                    return false;
                }
            }
        };

        // Тестовые данные для отладки
        function getMockVideos() {
            return [
                {
                    id: 1,
                    title: 'Тестовое видео 1',
                    description: 'Описание тестового видео',
                    channel_name: 'FreeTube Channel',
                    views: 1234,
                    created_at: new Date().toISOString(),
                    duration: 120,
                    thumbnail: null
                },
                {
                    id: 2,
                    title: 'Тестовое видео 2',
                    description: 'Еще одно тестовое видео',
                    channel_name: 'Test Channel',
                    views: 5678,
                    created_at: new Date().toISOString(),
                    duration: 180,
                    thumbnail: null
                }
            ];
        }

        window.supabaseClient = supabaseClient;
        window.supabaseHelpers = supabaseHelpers;
        supabaseHelpers.testConnection();
        console.log('🚀 FreeTube инициализирован');
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="/" class="logo">FreeTube</a>
            </div>
            <div class="nav-center">
                <input type="text" placeholder="Поиск видео..." id="searchInput">
                <button onclick="searchVideos()">🔍</button>
            </div>
            <div class="nav-right" id="navRight">
                <div class="loading-spinner" style="width:20px;height:20px;"></div>
            </div>
        </nav>
    </header>

    <main>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="latest">Новые</button>
            <button class="filter-btn" data-filter="popular">Популярные</button>
        </div>

        <div class="videos-grid" id="videosContainer">
            <div class="loading">Загрузка видео...</div>
        </div>
    </main>

    <script>
        // Глобальные функции
        window.searchVideos = async function() {
            const searchTerm = document.getElementById('searchInput').value;
            if (!searchTerm) {
                loadVideos();
                return;
            }
            
            const container = document.getElementById('videosContainer');
            container.innerHTML = '<div class="loading">Поиск...</div>';
            
            const { data: videos } = await supabaseHelpers.searchVideos(searchTerm);
            displayVideos(videos);
        };

        window.watchVideo = function(videoId) {
            window.location.href = `video.html?id=${videoId}`;
        };

        // Функция загрузки видео
        async function loadVideos(filter = 'all') {
            const container = document.getElementById('videosContainer');
            
            try {
                const { data: videos } = await supabaseHelpers.getVideos(filter);
                displayVideos(videos);
            } catch (error) {
                console.error('Ошибка:', error);
                container.innerHTML = '<div class="error-message">Ошибка загрузки видео</div>';
            }
        }

        // Функция отображения видео
        function displayVideos(videos) {
            const container = document.getElementById('videosContainer');
            
            if (!videos || videos.length === 0) {
                container.innerHTML = '<div class="no-videos">Видео не найдены</div>';
                return;
            }
            
            container.innerHTML = videos.map(video => {
                const views = formatViews(video.views || 0);
                const time = timeAgo(video.created_at);
                const duration = formatDuration(video.duration);
                
                return `
                <div class="video-card" onclick="watchVideo(${video.id})">
                    <div class="thumbnail-container">
                        ${video.thumbnail ? 
                            `<img src="${video.thumbnail}" class="thumbnail" alt="${video.title}">` :
                            `<div class="thumbnail" style="background: linear-gradient(45deg, #ff0000, #000); display: flex; align-items: center; justify-content: center;">
                                <span style="color: white; font-size: 48px;">🎥</span>
                            </div>`
                        }
                        <span class="duration">${duration}</span>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title || 'Без названия'}</h3>
                        <p class="channel-name">${video.channel_name || 'FreeTube User'}</p>
                        <div class="video-stats">
                            <span>${views} просмотров</span> • 
                            <span>${time}</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // Вспомогательные функции
        function formatViews(views) {
            if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views.toString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function timeAgo(date) {
            if (!date) return 'недавно';
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'только что';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' минут назад';
            if (seconds < 86400) return Math.floor(seconds / 3600) + ' часов назад';
            if (seconds < 2592000) return Math.floor(seconds / 86400) + ' дней назад';
            return new Date(date).toLocaleDateString();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Страница загружена');
            
            // Загружаем видео
            loadVideos();
            
            // Проверяем авторизацию
            const navRight = document.getElementById('navRight');
            try {
                const { data: { user } } = await supabaseHelpers.getCurrentUser();
                const localUser = localStorage.getItem('user');
                
                if (user || localUser) {
                    const email = user?.email || JSON.parse(localUser)?.email || 'User';
                    const initial = email.charAt(0).toUpperCase();
                    
                    navRight.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">${initial}</div>
                            <span>${email}</span>
                            <button onclick="window.location.href='upload.html'" style="background:#ff0000;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Загрузить</button>
                            <button onclick="logout()" style="background:#f0f0f0;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Выйти</button>
                        </div>
                    `;
                } else {
                    navRight.innerHTML = `
                        <button onclick="window.location.href='upload.html'" style="background:#ff0000;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Загрузить</button>
                        <button onclick="window.location.href='login.html'" style="background:#f0f0f0;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Войти</button>
                    `;
                }
            } catch (error) {
                console.error('Ошибка авторизации:', error);
                navRight.innerHTML = `
                    <button onclick="window.location.href='upload.html'" style="background:#ff0000;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Загрузить</button>
                    <button onclick="window.location.href='login.html'" style="background:#f0f0f0;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;">Войти</button>
                `;
            }
            
            // Фильтры
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    loadVideos(e.target.dataset.filter);
                });
            });
            
            // Поиск по Enter
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchVideos();
            });
        });

        // Функция выхода
        window.logout = async function() {
            await supabaseHelpers.signOut();
            localStorage.removeItem('user');
            window.location.reload();
        };
    </script>
</body>
</html>
