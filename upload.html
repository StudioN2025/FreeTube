<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузить видео - FreeTube</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Стили как в предыдущей версии */
    </style>
    
    <script>
        // Конфигурация Supabase
        const SUPABASE_CONFIG = {
            url: 'https://zsjxcrjopoxoaavmnoef.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzanhjcmpvcG94b2Fhdm1ub2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTcyMTMsImV4cCI6MjA4Nzg3MzIxM30.MV8W9SAO3lvjLoqlQOLuGjIf3Ipa-OTJDNYVzs9Rfkc'
        };

        if (typeof supabase === 'undefined') {
            console.error('❌ Supabase SDK не загружен!');
            throw new Error('Supabase SDK не загружен');
        }

        const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        // Вспомогательные функции - ВОТ СЮДА НУЖНО ВСТАВЛЯТЬ!
        const supabaseHelpers = {
            // Получение всех видео
            async getVideos(filter = 'all', limit = 50) {
                try {
                    let query = supabaseClient
                        .from('videos')
                        .select('*');
                    
                    switch(filter) {
                        case 'latest':
                            query = query.order('created_at', { ascending: false });
                            break;
                        case 'popular':
                            query = query.order('views', { ascending: false });
                            break;
                        default:
                            query = query.order('created_at', { ascending: false });
                    }
                    
                    const { data, error } = await query.limit(limit);
                    
                    if (error) throw error;
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка получения видео:', error);
                    return { data: null, error };
                }
            },

            // Получение видео по ID
            async getVideoById(videoId) {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('*')
                        .eq('id', videoId)
                        .single();
                    
                    if (error) throw error;
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка получения видео:', error);
                    return { data: null, error };
                }
            },

            // ВОТ ЗДЕСЬ - функция создания видео
            async createVideo(videoData) {
                try {
                    console.log('Создание видео с данными:', videoData);
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .insert([{
                            title: videoData.title,
                            description: videoData.description,
                            duration: videoData.duration,
                            channel_name: videoData.channel_name,
                            user_id: videoData.user_id,
                            thumbnail: videoData.thumbnail,
                            total_chunks: videoData.total_chunks,
                            status: 'uploading'
                        }])
                        .select();
                    
                    if (error) {
                        console.error('Детали ошибки:', error);
                        throw error;
                    }
                    
                    console.log('Видео создано успешно:', data);
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка создания видео:', error);
                    return { data: null, error };
                }
            },

            // ВОТ ЗДЕСЬ - функция сохранения чанка (saveChunk)
            async saveChunk(videoId, chunkIndex, chunkData) {
                try {
                    console.log(`Сохранение чанка ${chunkIndex} для видео ${videoId}`);
                    const { data, error } = await supabaseClient
                        .from('video_chunks')
                        .insert([{
                            video_id: videoId,
                            chunk_index: chunkIndex,
                            chunk_data: chunkData
                        }]);
                    
                    if (error) {
                        console.error('Ошибка сохранения чанка:', error);
                        throw error;
                    }
                    
                    console.log(`Чанк ${chunkIndex} сохранен успешно`);
                    return { success: true, error: null };
                } catch (error) {
                    console.error('Ошибка сохранения чанка:', error);
                    return { success: false, error };
                }
            },

            // Функция завершения загрузки
            async completeUpload(videoId) {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .update({ status: 'completed' })
                        .eq('id', videoId);
                    
                    if (error) throw error;
                    return { success: true, error: null };
                } catch (error) {
                    console.error('Ошибка завершения загрузки:', error);
                    return { success: false, error };
                }
            },

            // Поиск видео
            async searchVideos(searchTerm) {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('*')
                        .ilike('title', `%${searchTerm}%`)
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка поиска:', error);
                    return { data: null, error };
                }
            },

            // Рекомендации
            async getRecommendedVideos(currentVideoId, limit = 10) {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('*')
                        .neq('id', currentVideoId)
                        .order('views', { ascending: false })
                        .limit(limit);
                    
                    if (error) throw error;
                    return { data, error: null };
                } catch (error) {
                    console.error('Ошибка получения рекомендаций:', error);
                    return { data: null, error };
                }
            },

            // Получение текущего пользователя
            getCurrentUser() {
                return supabaseClient.auth.getUser();
            },

            // Выход
            async signOut() {
                try {
                    const { error } = await supabaseClient.auth.signOut();
                    if (error) throw error;
                    return { success: true, error: null };
                } catch (error) {
                    console.error('Ошибка выхода:', error);
                    return { success: false, error };
                }
            },

            // Проверка соединения
            async testConnection() {
                try {
                    const { data, error } = await supabaseClient
                        .from('videos')
                        .select('count', { count: 'exact', head: true });
                    
                    if (error) throw error;
                    console.log('✅ Соединение с Supabase установлено');
                    return true;
                } catch (error) {
                    console.error('❌ Ошибка соединения с Supabase:', error.message);
                    return false;
                }
            }
        };

        // Делаем функции доступными глобально
        window.supabaseClient = supabaseClient;
        window.supabaseHelpers = supabaseHelpers;

        // Функция выхода
        window.logout = async function() {
            try {
                await supabaseHelpers.signOut();
                localStorage.removeItem('user');
                alert('Вы вышли из системы');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Ошибка при выходе:', error);
            }
        };

        // Тестируем соединение
        supabaseHelpers.testConnection();
        console.log('🚀 FreeTube Upload инициализирован');
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="/" class="logo">FreeTube</a>
            </div>
            <div class="nav-right" id="navRight"></div>
        </nav>
    </header>

    <main class="upload-container">
        <h1>Загрузить видео</h1>
        
        <div class="quality-info">
            <strong>📦 Новая система:</strong> Видео разбивается на чанки и загружается по частям
        </div>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="videoInput" accept="video/*" hidden>
            <div class="upload-content">
                <div class="upload-icon">📹</div>
                <p>Нажмите для выбора видео или перетащите файл сюда</p>
                <small>Максимальный размер: 500 МБ</small>
                <div class="format-info">
                    <i>Поддерживаемые форматы: MP4, WebM, OGG, MOV</i>
                </div>
                <div class="file-size-warning" id="fileSizeWarning"></div>
            </div>
        </div>

        <div class="video-preview" id="videoPreview" style="display: none;">
            <video controls></video>
            <div class="file-size-warning" id="previewSizeWarning"></div>
            <div class="chunk-info" id="chunkInfo"></div>
        </div>

        <form id="uploadForm" style="display: none;">
            <div class="form-group">
                <label for="title">Название видео</label>
                <input type="text" id="title" required maxlength="100" placeholder="Введите название видео">
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" rows="4" maxlength="5000" placeholder="Введите описание видео"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="uploadBtn">
                <span class="btn-text">Начать загрузку</span>
                <span class="loading-spinner" style="display: none;"></span>
            </button>
        </form>

        <div class="progress-bar" style="display: none;">
            <div class="progress-fill"></div>
            <span class="progress-text">0%</span>
        </div>
    </main>

    <script src="js/upload-chunks.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const navRight = document.getElementById('navRight');
            
            try {
                const { data: { user } } = await supabaseHelpers.getCurrentUser();
                
                if (user) {
                    const email = user.email || 'User';
                    const initial = email.charAt(0).toUpperCase();
                    
                    navRight.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">${initial}</div>
                            <span>${email}</span>
                            <button id="logoutBtn" onclick="logout()">Выйти</button>
                        </div>
                    `;
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
